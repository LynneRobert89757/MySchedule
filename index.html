<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <title>Personal Schedule</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');
        body { 
            font-family: 'Inter', -apple-system, "Helvetica Neue", "PingFang SC", "Microsoft YaHei", sans-serif; 
            background-color: #F8FAFC; 
            -webkit-tap-highlight-color: transparent;
        }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #E2E8F0; border-radius: 10px; }
        .scale-in { animation: scaleIn 0.2s ease-out forwards; }
        @keyframes scaleIn { from { transform: scale(0.98); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- Firebase 配置 ---
        const firebaseConfig = {
            apiKey: "AIzaSyA7q6oj5cO9ZkGg3s7_9Y79pQQobsfDYz0",
            authDomain: "myscheduleapp-5f36e.firebaseapp.com",
            projectId: "myscheduleapp-5f36e",
            storageBucket: "myscheduleapp-5f36e.firebasestorage.app",
            messagingSenderId: "180770476518",
            appId: "1:180770476518:web:5dde99c4429699937dc627",
            measurementId: "G-H0G7EQ0BC0"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        const APP_ID = 'my-personal-schedule';

        const CATEGORIES = {
            life: { label: '生活', dot: 'bg-emerald-400' },
            study: { label: '学习', dot: 'bg-indigo-400' },
            work: { label: '工作', dot: 'bg-blue-400' },
            sport: { label: '运动', dot: 'bg-slate-400' }
        };

        const QUADRANTS = {
            important_urgent: { label: '重要且紧急', accent: 'border-blue-500/40' },
            important_not_urgent: { label: '重要非紧急', accent: 'border-slate-300/30' },
            urgent_not_important: { label: '紧急非重要', accent: 'border-slate-200/30' },
            completed: { label: '已完成归档', accent: 'border-transparent' }
        };

        function App() {
            const [tasks, setTasks] = useState([]);
            const [loading, setLoading] = useState(true);
            const [searchQuery, setSearchQuery] = useState('');
            const [isAdding, setIsAdding] = useState(false);
            const [newTaskTitle, setNewTaskTitle] = useState('');
            const [selectedCategory, setSelectedCategory] = useState('work');
            const [selectedQuadrant, setSelectedQuadrant] = useState('important_urgent');

            useEffect(() => {
                const init = async () => {
                    await auth.signInAnonymously();
                    const path = db.collection('artifacts').doc(APP_ID).collection('public').doc('data').collection('tasks');
                    return path.onSnapshot(snap => {
                        const items = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                        setTasks(items.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt)));
                        setLoading(false);
                    });
                };
                let unsub;
                init().then(u => unsub = u);
                return () => unsub && unsub();
            }, []);

            const filteredTasks = useMemo(() => {
                if (!searchQuery.trim()) return tasks;
                return tasks.filter(t => t.title.toLowerCase().includes(searchQuery.toLowerCase()));
            }, [tasks, searchQuery]);

            const addTask = async () => {
                if (!newTaskTitle.trim()) return;
                await db.collection('artifacts').doc(APP_ID).collection('public').doc('data').collection('tasks').add({
                    title: newTaskTitle,
                    category: selectedCategory,
                    quadrant: selectedQuadrant,
                    totalHours: 0,
                    notes: [],
                    createdAt: new Date().toISOString()
                });
                setNewTaskTitle('');
                setIsAdding(false);
            };

            const exportData = () => {
                const blob = new Blob([JSON.stringify(tasks, null, 2)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `schedule-backup.json`;
                a.click();
            };

            if (loading) return <div className="min-h-screen flex items-center justify-center text-xs tracking-widest text-slate-400">SYNCING...</div>;

            return (
                <div className="max-w-md mx-auto min-h-screen p-6 pb-24">
                    <header className="flex justify-between items-end mb-10">
                        <div>
                            <h1 className="text-4xl font-light text-slate-900 tracking-tight">Schedule</h1>
                            <div className="flex items-center gap-2 mt-2">
                                <span className="w-2 h-2 bg-blue-500 rounded-full animate-pulse"></span>
                                <span className="text-[11px] uppercase tracking-widest text-blue-500 font-bold">Cloud Live</span>
                            </div>
                        </div>
                        <div className="flex gap-4">
                            <button onClick={exportData} title="备份数据" className="text-slate-300 hover:text-slate-600 transition-colors">
                                <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
                            </button>
                            <button onClick={() => setIsAdding(!isAdding)} className={`p-3.5 rounded-full shadow-lg transition-all ${isAdding ? 'bg-slate-900 text-white rotate-45' : 'bg-white text-slate-900'}`}>
                                <svg width="22" height="22" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M12 5v14M5 12h14"/></svg>
                            </button>
                        </div>
                    </header>

                    <div className="relative mb-10">
                        <input 
                            type="text"
                            placeholder="搜索任务..."
                            className="w-full bg-white border-none rounded-2xl py-4 px-6 text-[15px] shadow-sm focus:ring-1 focus:ring-blue-100 placeholder:text-slate-300"
                            value={searchQuery}
                            onChange={e => setSearchQuery(e.target.value)}
                        />
                    </div>

                    {isAdding && (
                        <div className="bg-white rounded-[2.5rem] p-8 mb-10 shadow-xl border border-slate-50 scale-in">
                            <input 
                                className="w-full text-2xl font-light border-none focus:ring-0 p-0 mb-8 placeholder:text-slate-200 bg-transparent"
                                placeholder="新任务名称..."
                                value={newTaskTitle}
                                onChange={e => setNewTaskTitle(e.target.value)}
                                autoFocus
                            />
                            <div className="flex flex-wrap gap-2.5 mb-8">
                                {Object.entries(CATEGORIES).map(([key, val]) => (
                                    <button key={key} onClick={() => setSelectedCategory(key)} className={`px-5 py-2 rounded-full text-xs transition-all border ${selectedCategory === key ? 'bg-slate-900 text-white border-transparent' : 'bg-white text-slate-500 border-slate-100'}`}>
                                        {val.label}
                                    </button>
                                ))}
                            </div>
                            <div className="grid grid-cols-2 gap-3 mb-8">
                                {Object.entries(QUADRANTS).filter(([k])=>k!=='completed').map(([key, val]) => (
                                    <button key={key} onClick={() => setSelectedQuadrant(key)} className={`text-left p-4 rounded-2xl text-xs border ${selectedQuadrant === key ? 'bg-blue-50 border-blue-100 text-blue-600' : 'bg-white border-slate-100 text-slate-400'}`}>
                                        {val.label}
                                    </button>
                                ))}
                            </div>
                            <button onClick={addTask} className="w-full bg-slate-900 text-white py-5 rounded-2xl text-[15px] font-bold">确认添加</button>
                        </div>
                    )}

                    <div className="space-y-12">
                        {Object.entries(QUADRANTS).map(([qId, qInfo]) => {
                            const qTasks = filteredTasks.filter(t => t.quadrant === qId);
                            if (qTasks.length === 0 && (qId === 'completed' || searchQuery)) return null;
                            return (
                                <section key={qId} className="scale-in">
                                    <div className="flex items-center gap-4 mb-5">
                                        <h2 className="text-[11px] font-bold text-slate-300 uppercase tracking-widest">{qInfo.label}</h2>
                                        <div className="h-px flex-1 bg-slate-100"></div>
                                        <span className="text-[11px] font-mono text-slate-200">{qTasks.length}</span>
                                    </div>
                                    <div className="space-y-4">
                                        {qTasks.map(task => (
                                            <TaskItem key={task.id} task={task} />
                                        ))}
                                    </div>
                                </section>
                            );
                        })}
                    </div>
                </div>
            );
        }

        function TaskItem({ task }) {
            const [expanded, setExpanded] = useState(false);
            const [note, setNote] = useState('');
            const [hrs, setHrs] = useState(0);

            const update = (upd) => db.collection('artifacts').doc(APP_ID).collection('public').doc('data').collection('tasks').doc(task.id).update(upd);
            const remove = () => window.confirm('彻底删除任务？') && db.collection('artifacts').doc(APP_ID).collection('public').doc('data').collection('tasks').doc(task.id).delete();

            const saveRecord = () => {
                if (!note.trim() && hrs === 0) return;
                update({
                    notes: [{ text: note, hours: hrs, time: new Date().toLocaleString('zh-CN', { month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' }) }, ...(task.notes || [])],
                    totalHours: (task.totalHours || 0) + hrs
                });
                setNote(''); setHrs(0);
            };

            return (
                <div className={`bg-white rounded-[1.5rem] border shadow-sm transition-all ${QUADRANTS[task.quadrant].accent}`}>
                    <div className="p-5 flex items-center justify-between cursor-pointer" onClick={() => setExpanded(!expanded)}>
                        <div className="flex items-center gap-4 overflow-hidden">
                            <div className={`w-2 h-2 rounded-full flex-shrink-0 ${CATEGORIES[task.category]?.dot}`}></div>
                            <span className={`text-[16px] truncate ${task.quadrant === 'completed' ? 'text-slate-200 line-through' : 'text-slate-700 font-medium'}`}>{task.title}</span>
                        </div>
                        <div className="flex items-center gap-2">
                            <span className="text-[12px] font-mono text-slate-400 mr-3">{(task.totalHours || 0).toFixed(2)}h</span>
                            <button onClick={e => { e.stopPropagation(); update({ quadrant: task.quadrant === 'completed' ? 'important_urgent' : 'completed' }); }} className={`p-2.5 rounded-full ${task.quadrant === 'completed' ? 'text-blue-500 bg-blue-50' : 'text-slate-100'}`}>
                                <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="3" d="M5 13l4 4L19 7"/></svg>
                            </button>
                        </div>
                    </div>
                    {expanded && (
                        <div className="px-6 pb-6 pt-2 border-t border-slate-50 scale-in">
                            <div className="space-y-4 mb-6 max-h-52 overflow-y-auto custom-scrollbar">
                                {(task.notes || []).map((n, i) => (
                                    <div key={i} className="text-[13px] bg-slate-50 p-4 rounded-2xl text-slate-600 leading-relaxed">
                                        <div className="flex justify-between text-[10px] text-slate-300 mb-2 font-mono uppercase tracking-tighter"><span>{n.time}</span><span>+{n.hours}h</span></div>
                                        {n.text}
                                    </div>
                                ))}
                            </div>
                            <div className="bg-slate-50 rounded-2xl p-4 border border-slate-100">
                                <textarea className="w-full bg-transparent border-none focus:ring-0 p-0 text-[14px] text-slate-600 placeholder:text-slate-200 h-20 resize-none leading-relaxed" placeholder="记录灵感或专注心得..." value={note} onChange={e => setNote(e.target.value)} />
                                <div className="flex items-center justify-between mt-4">
                                    <div className="flex items-center bg-white rounded-xl px-2 py-1 border border-slate-100">
                                        <button onClick={() => setHrs(Math.max(0, hrs - 0.25))} className="px-3 py-1 text-slate-300 hover:text-slate-600 transition-colors">-</button>
                                        <span className="text-[12px] font-mono w-12 text-center text-slate-600">{hrs.toFixed(2)}</span>
                                        <button onClick={() => setHrs(hrs + 0.25)} className="px-3 py-1 text-slate-300 hover:text-slate-600 transition-colors">+</button>
                                    </div>
                                    <div className="flex gap-4">
                                        <button onClick={remove} className="px-3 py-1.5 text-[10px] text-slate-300 uppercase tracking-widest font-bold hover:text-red-300 transition-colors">删除</button>
                                        <button onClick={saveRecord} className="bg-slate-900 text-white px-6 py-2 rounded-xl text-xs font-bold shadow-md shadow-slate-200 active:scale-95 transition-all">保存</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
