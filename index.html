<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <title>Personal Schedule</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');
        body { 
            font-family: 'Inter', -apple-system, "Helvetica Neue", "PingFang SC", "Microsoft YaHei", sans-serif; 
            background-color: #F8FAFC; 
            -webkit-tap-highlight-color: transparent;
            color: #1E293B;
        }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #E2E8F0; border-radius: 10px; }
        .scale-in { animation: scaleIn 0.2s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes scaleIn { from { transform: scale(0.96); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        
        .tap-active:active {
            transform: scale(0.98);
            transition: transform 0.1s;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- Firebase 配置 ---
        const firebaseConfig = {
            apiKey: "AIzaSyA7q6oj5cO9ZkGg3s7_9Y79pQQobsfDYz0",
            authDomain: "myscheduleapp-5f36e.firebaseapp.com",
            projectId: "myscheduleapp-5f36e",
            storageBucket: "myscheduleapp-5f36e.firebasestorage.app",
            messagingSenderId: "180770476518",
            appId: "1:180770476518:web:5dde99c4429699937dc627",
            measurementId: "G-H0G7EQ0BC0"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        const APP_ID = 'my-personal-schedule';

        const CATEGORIES = {
            life: { label: '生活', dot: 'bg-emerald-400', shadow: 'shadow-emerald-200/50' },
            study: { label: '学习', dot: 'bg-indigo-400', shadow: 'shadow-indigo-200/50' },
            work: { label: '工作', dot: 'bg-blue-400', shadow: 'shadow-blue-200/50' },
            sport: { label: '运动', dot: 'bg-rose-400', shadow: 'shadow-rose-200/50' }
        };

        const QUADRANTS = {
            important_urgent: { label: '重要且紧急', accent: 'border-blue-500/20' },
            important_not_urgent: { label: '重要非紧急', accent: 'border-slate-300/20' },
            urgent_not_important: { label: '紧急非重要', accent: 'border-slate-200/20' },
            completed: { label: '已完成归档', accent: 'border-transparent' }
        };

        function App() {
            const [tasks, setTasks] = useState([]);
            const [loading, setLoading] = useState(true);
            const [searchQuery, setSearchQuery] = useState('');
            const [isAdding, setIsAdding] = useState(false);
            const [newTaskTitle, setNewTaskTitle] = useState('');
            const [selectedCategory, setSelectedCategory] = useState('work');
            const [selectedQuadrant, setSelectedQuadrant] = useState('important_urgent');

            useEffect(() => {
                const init = async () => {
                    await auth.signInAnonymously();
                    const path = db.collection('artifacts').doc(APP_ID).collection('public').doc('data').collection('tasks');
                    return path.onSnapshot(snap => {
                        const items = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                        setTasks(items.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt)));
                        setLoading(false);
                    });
                };
                let unsub;
                init().then(u => unsub = u);
                return () => unsub && unsub();
            }, []);

            const filteredTasks = useMemo(() => {
                if (!searchQuery.trim()) return tasks;
                return tasks.filter(t => t.title.toLowerCase().includes(searchQuery.toLowerCase()));
            }, [tasks, searchQuery]);

            const addTask = async () => {
                if (!newTaskTitle.trim()) return;
                await db.collection('artifacts').doc(APP_ID).collection('public').doc('data').collection('tasks').add({
                    title: newTaskTitle,
                    category: selectedCategory,
                    quadrant: selectedQuadrant,
                    totalHours: 0,
                    notes: [],
                    createdAt: new Date().toISOString()
                });
                setNewTaskTitle('');
                setIsAdding(false);
            };

            const exportData = () => {
                const blob = new Blob([JSON.stringify(tasks, null, 2)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `schedule-backup.json`;
                a.click();
            };

            if (loading) return (
                <div className="min-h-screen flex flex-col items-center justify-center bg-white">
                    <div className="w-10 h-10 border-2 border-slate-100 border-t-blue-500 rounded-full animate-spin mb-4"></div>
                    <div className="text-[10px] tracking-[0.2em] text-slate-400 font-bold uppercase">Cloud Syncing</div>
                </div>
            );

            return (
                <div className="max-w-md mx-auto min-h-screen p-6 pb-32">
                    <header className="flex justify-between items-end mb-10 pt-4">
                        <div>
                            <h1 className="text-4xl font-light text-slate-900 tracking-tight">Schedule</h1>
                            <div className="flex items-center gap-2 mt-2">
                                <span className="relative flex h-2 w-2">
                                  <span className="animate-ping absolute inline-flex h-full w-full rounded-full bg-blue-400 opacity-75"></span>
                                  <span className="relative inline-flex rounded-full h-2 w-2 bg-blue-500"></span>
                                </span>
                                <span className="text-[11px] uppercase tracking-widest text-blue-500 font-black">Live Cloud</span>
                            </div>
                        </div>
                        <div className="flex gap-4">
                            <button onClick={exportData} title="导出备份" className="text-slate-300 hover:text-slate-600 transition-all p-2 tap-active">
                                <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"/></svg>
                            </button>
                            <button 
                                onClick={() => setIsAdding(!isAdding)} 
                                className={`p-4 rounded-full shadow-2xl transition-all tap-active ${isAdding ? 'bg-slate-900 text-white rotate-45' : 'bg-white text-slate-900 shadow-slate-200'}`}
                            >
                                <svg width="22" height="22" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="3" d="M12 5v14M5 12h14"/></svg>
                            </button>
                        </div>
                    </header>

                    <div className="relative mb-10 group">
                        <div className="absolute inset-y-0 left-5 flex items-center pointer-events-none text-slate-300 group-focus-within:text-blue-500 transition-colors">
                            <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
                        </div>
                        <input 
                            type="text"
                            placeholder="检索任务..."
                            className="w-full bg-white border-none rounded-[1.5rem] py-4 pl-14 pr-6 text-[16px] shadow-sm focus:ring-2 focus:ring-blue-50 transition-all"
                            value={searchQuery}
                            onChange={e => setSearchQuery(e.target.value)}
                        />
                    </div>

                    {isAdding && (
                        <div className="bg-white rounded-[2.5rem] p-8 mb-10 shadow-2xl shadow-slate-200/60 border border-slate-50 scale-in">
                            <input 
                                className="w-full text-2xl font-light border-none focus:ring-0 p-0 mb-8 placeholder:text-slate-200 bg-transparent"
                                placeholder="输入新任务..."
                                value={newTaskTitle}
                                onChange={e => setNewTaskTitle(e.target.value)}
                                autoFocus
                            />
                            <div className="mb-8">
                                <p className="text-[10px] font-bold text-slate-300 uppercase tracking-widest mb-4">维度分类</p>
                                <div className="flex flex-wrap gap-2.5">
                                    {Object.entries(CATEGORIES).map(([key, val]) => (
                                        <button key={key} onClick={() => setSelectedCategory(key)} className={`px-5 py-2 rounded-xl text-xs transition-all border tap-active ${selectedCategory === key ? 'bg-slate-900 text-white border-transparent shadow-lg' : 'bg-white text-slate-500 border-slate-100'}`}>
                                            <span className={`inline-block w-1.5 h-1.5 rounded-full mr-2 ${val.dot}`}></span>
                                            {val.label}
                                        </button>
                                    ))}
                                </div>
                            </div>
                            <div className="mb-8">
                                <p className="text-[10px] font-bold text-slate-300 uppercase tracking-widest mb-4">重要程度</p>
                                <div className="grid grid-cols-2 gap-3">
                                    {Object.entries(QUADRANTS).filter(([k])=>k!=='completed').map(([key, val]) => (
                                        <button key={key} onClick={() => setSelectedQuadrant(key)} className={`text-left p-4 rounded-2xl text-xs border transition-all tap-active ${selectedQuadrant === key ? 'bg-blue-50 border-blue-100 text-blue-600 font-bold' : 'bg-white border-slate-100 text-slate-400'}`}>
                                            {val.label}
                                        </button>
                                    ))}
                                </div>
                            </div>
                            <button onClick={addTask} className="w-full bg-slate-900 text-white py-5 rounded-[1.5rem] text-[16px] font-bold shadow-xl shadow-slate-200 tap-active">添加至日程</button>
                        </div>
                    )}

                    <div className="space-y-12">
                        {Object.entries(QUADRANTS).map(([qId, qInfo]) => {
                            const qTasks = filteredTasks.filter(t => t.quadrant === qId);
                            if (qTasks.length === 0 && (qId === 'completed' || searchQuery)) return null;
                            return (
                                <section key={qId} className="scale-in">
                                    <div className="flex items-center gap-4 mb-5 px-1">
                                        <h2 className="text-[12px] font-bold text-slate-400 uppercase tracking-widest">{qInfo.label}</h2>
                                        <div className="h-[1px] flex-1 bg-slate-100"></div>
                                        <span className="text-[12px] font-mono font-bold text-slate-300">{qTasks.length}</span>
                                    </div>
                                    <div className="space-y-4">
                                        {qTasks.map(task => (
                                            <TaskItem key={task.id} task={task} />
                                        ))}
                                    </div>
                                </section>
                            );
                        })}
                    </div>
                </div>
            );
        }

        function TaskItem({ task }) {
            const [expanded, setExpanded] = useState(false);
            const [note, setNote] = useState('');
            const [hrs, setHrs] = useState(0);

            const update = (upd) => db.collection('artifacts').doc(APP_ID).collection('public').doc('data').collection('tasks').doc(task.id).update(upd);
            const remove = () => window.confirm('彻底删除此项任务？') && db.collection('artifacts').doc(APP_ID).collection('public').doc('data').collection('tasks').doc(task.id).delete();

            const saveRecord = () => {
                if (!note.trim() && hrs === 0) return;
                update({
                    notes: [{ text: note, hours: hrs, time: new Date().toLocaleString('zh-CN', { month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' }) }, ...(task.notes || [])],
                    totalHours: (task.totalHours || 0) + hrs
                });
                setNote(''); setHrs(0);
            };

            const cat = CATEGORIES[task.category] || CATEGORIES.work;

            return (
                <div className={`bg-white rounded-[1.75rem] border shadow-sm transition-all duration-300 ${QUADRANTS[task.quadrant].accent} ${expanded ? 'shadow-xl shadow-slate-200/40 -translate-y-1' : ''}`}>
                    <div className="p-5 flex items-center justify-between cursor-pointer tap-active" onClick={() => setExpanded(!expanded)}>
                        <div className="flex items-center gap-4 overflow-hidden">
                            {/* 分类彩色圆点 */}
                            <div className={`w-3 h-3 rounded-full flex-shrink-0 ${cat.dot} shadow-lg ${cat.shadow}`}></div>
                            <span className={`text-[17px] truncate transition-all ${task.quadrant === 'completed' ? 'text-slate-200 line-through font-light' : 'text-slate-700 font-medium'}`}>{task.title}</span>
                        </div>
                        <div className="flex items-center gap-3">
                            <span className="text-[12px] font-mono font-bold text-slate-300 px-2 py-1 bg-slate-50 rounded-full border border-slate-100">{(task.totalHours || 0).toFixed(2)}h</span>
                            <button onClick={e => { e.stopPropagation(); update({ quadrant: task.quadrant === 'completed' ? 'important_urgent' : 'completed' }); }} className={`p-2.5 rounded-full transition-all tap-active ${task.quadrant === 'completed' ? 'text-blue-500 bg-blue-50' : 'text-slate-100 hover:text-blue-500'}`}>
                                <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="3" d="M5 13l4 4L19 7"/></svg>
                            </button>
                        </div>
                    </div>
                    {expanded && (
                        <div className="px-6 pb-6 pt-2 border-t border-slate-50 scale-in">
                            <div className="space-y-4 mb-6 max-h-60 overflow-y-auto custom-scrollbar pt-2 pr-1">
                                {(task.notes || []).length === 0 && <p className="text-center py-6 text-[13px] text-slate-200 font-light">还没有投入时间记录</p>}
                                {(task.notes || []).map((n, i) => (
                                    <div key={i} className="text-[14px] bg-slate-50/50 p-4 rounded-2xl text-slate-600 leading-relaxed border border-white">
                                        <div className="flex justify-between text-[11px] text-slate-300 mb-2 font-mono uppercase tracking-tighter font-bold">
                                            <span>{n.time}</span>
                                            <span className="text-blue-400">+{n.hours.toFixed(2)}h</span>
                                        </div>
                                        {n.text || <span className="italic text-slate-300 font-light text-[13px]">未填写备注</span>}
                                    </div>
                                ))}
                            </div>
                            <div className="bg-slate-50 rounded-3xl p-5 border border-slate-100">
                                <textarea 
                                    className="w-full bg-transparent border-none focus:ring-0 p-0 text-[15px] text-slate-600 placeholder:text-slate-200 h-20 resize-none leading-relaxed" 
                                    placeholder="补充一些记录..." 
                                    value={note} 
                                    onChange={e => setNote(e.target.value)} 
                                />
                                <div className="flex flex-col sm:flex-row items-center justify-between mt-4 gap-4">
                                    <div className="flex items-center bg-white rounded-2xl px-2 py-1.5 border border-slate-100 shadow-sm w-full sm:w-auto justify-center">
                                        <button onClick={() => setHrs(Math.max(0, hrs - 0.25))} className="px-4 py-1 text-slate-300 hover:text-slate-900 transition-colors text-xl font-bold tap-active">-</button>
                                        <span className="text-[15px] font-mono w-16 text-center text-slate-700 font-black">{hrs.toFixed(2)}h</span>
                                        <button onClick={() => setHrs(hrs + 0.25)} className="px-4 py-1 text-slate-300 hover:text-slate-900 transition-colors text-xl font-bold tap-active">+</button>
                                    </div>
                                    <div className="flex gap-4 w-full sm:w-auto">
                                        <button onClick={remove} className="flex-1 sm:flex-none px-4 py-2.5 text-[11px] text-slate-300 uppercase tracking-widest font-black hover:text-red-400 transition-colors tap-active">删除</button>
                                        <button onClick={saveRecord} className="flex-1 sm:flex-none bg-slate-900 text-white px-8 py-2.5 rounded-2xl text-[14px] font-bold shadow-lg shadow-slate-200 tap-active">保存</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
