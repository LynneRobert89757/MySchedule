<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schedule Cloud - 云端日程管理</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Firebase SDKs (使用 compat 版本以确保全局 firebase 变量可用) -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400;500;600&display=swap');
        body { font-family: 'Inter', -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
        .scale-in { animation: scaleIn 0.2s ease-out forwards; }
        @keyframes scaleIn { from { transform: scale(0.98); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .loading-dots:after { content: '.'; animation: dots 1.5s steps(5, end) infinite; }
        @keyframes dots { 0%, 20% { content: '.'; } 40% { content: '..'; } 60% { content: '...'; } 80%, 100% { content: ''; } }
    </style>
</head>
<body class="bg-[#F8FAFC]">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- Firebase 配置区 ---
        // 提示：如果你在本地运行，请将下面的 myPrivateConfig 替换为你从 Firebase 控制台获取的内容
        const myPrivateConfig = {
            apiKey: "AIzaSyA7q6oj5cO9ZkGg3s7_9Y79pQQobsfDYz0",
            authDomain: "myscheduleapp-5f36e.firebaseapp.com",
            projectId: "myscheduleapp-5f36e",
            storageBucket: "myscheduleapp-5f36e.firebasestorage.app",
            messagingSenderId: "180770476518",
            appId: "1:180770476518:web:5dde99c4429699937dc627",
            measurementId: "G-H0G7EQ0BC0"
        };

        let db, auth;
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'my-personal-schedule';

        const initFirebase = () => {
            try {
                // 优先使用环境注入的配置，否则使用手动填写的私有配置
                const config = typeof __firebase_config !== 'undefined' 
                    ? JSON.parse(__firebase_config) 
                    : myPrivateConfig;

                if (config && !firebase.apps.length) {
                    firebase.initializeApp(config);
                    auth = firebase.auth();
                    db = firebase.firestore();
                    return true;
                }
                return !!firebase.apps.length;
            } catch (e) {
                console.error("Firebase 启动失败:", e);
                return false;
            }
        };

        const isCloudReady = initFirebase();

        const CATEGORIES = {
            life: { label: '生活', dot: 'bg-emerald-400' },
            study: { label: '学习', dot: 'bg-indigo-400' },
            work: { label: '工作', dot: 'bg-blue-400' },
            sport: { label: '运动', dot: 'bg-slate-400' }
        };

        const QUADRANTS = {
            important_urgent: { label: '重要且紧急', accent: 'border-blue-500/40' },
            important_not_urgent: { label: '重要非紧急', accent: 'border-slate-300/40' },
            urgent_not_important: { label: '紧急非重要', accent: 'border-slate-200/40' },
            completed: { label: '已完成归档', accent: 'border-transparent' }
        };

        // 图标组件
        const IconPlus = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>;
        const IconTrash = () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>;
        const IconCheck = () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>;
        const IconNote = () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>;

        function App() {
            const [user, setUser] = useState(null);
            const [tasks, setTasks] = useState([]);
            const [loading, setLoading] = useState(isCloudReady);
            const [isAdding, setIsAdding] = useState(false);
            const [newTaskTitle, setNewTaskTitle] = useState('');
            const [selectedCategory, setSelectedCategory] = useState('work');
            const [selectedQuadrant, setSelectedQuadrant] = useState('important_urgent');

            // 认证监听
            useEffect(() => {
                if (!isCloudReady) return;
                const initAuth = async () => {
                    try {
                        // 在 Canvas 环境中使用初始 Token，否则使用匿名登录
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await auth.signInWithCustomToken(__initial_auth_token);
                        } else {
                            await auth.signInAnonymously();
                        }
                    } catch (err) {
                        console.error("Auth 失败:", err);
                    }
                };
                initAuth();
                const unsubscribe = auth.onAuthStateChanged((u) => setUser(u));
                return () => unsubscribe();
            }, []);

            // 数据实时同步
            useEffect(() => {
                if (!user || !isCloudReady) return;
                // 确保集合路径符合权限规则
                const collectionRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('tasks');
                const unsubscribe = collectionRef.onSnapshot(
                    (snapshot) => {
                        const taskData = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                        setTasks(taskData.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt)));
                        setLoading(false);
                    },
                    (error) => {
                        console.error("Firestore 同步错误:", error);
                        setLoading(false);
                    }
                );
                return () => unsubscribe();
            }, [user]);

            const addTask = async (e) => {
                e.preventDefault();
                if (!newTaskTitle.trim()) return;
                
                const task = {
                    title: newTaskTitle,
                    category: selectedCategory,
                    quadrant: selectedQuadrant,
                    totalHours: 0,
                    notes: [],
                    createdAt: new Date().toISOString(),
                    ownerId: user?.uid || 'local-user'
                };

                if (isCloudReady && user) {
                    try {
                        await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('tasks').add(task);
                    } catch (err) { console.error(err); }
                } else {
                    setTasks([{ ...task, id: Date.now().toString() }, ...tasks]);
                }
                
                setNewTaskTitle('');
                setIsAdding(false);
            };

            const deleteTask = async (id) => {
                if(!window.confirm('确定要删除吗？')) return;
                if (isCloudReady && user) {
                    await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('tasks').doc(id).delete();
                } else {
                    setTasks(tasks.filter(t => t.id !== id));
                }
            };

            const updateTask = async (id, updates) => {
                if (isCloudReady && user) {
                    await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('tasks').doc(id).update(updates);
                } else {
                    setTasks(tasks.map(t => t.id === id ? { ...t, ...updates } : t));
                }
            };

            if (loading) {
                return (
                    <div className="min-h-screen flex items-center justify-center bg-[#F8FAFC]">
                        <div className="text-slate-400 text-sm font-light tracking-widest uppercase animate-pulse loading-dots">正在连接云端</div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen bg-[#F8FAFC] text-slate-600 font-light p-6 md:p-12">
                    <div className="max-w-lg mx-auto">
                        <header className="mb-10 flex justify-between items-end">
                            <div>
                                <h1 className="text-3xl font-extralight text-slate-900 tracking-tighter mb-1">Schedule</h1>
                                <div className="flex items-center gap-2">
                                    <span className={`flex h-1.5 w-1.5 rounded-full ${isCloudReady ? 'bg-blue-500 animate-pulse' : 'bg-orange-400'}`}></span>
                                    <p className="text-[10px] uppercase tracking-[0.2em] text-slate-400 font-medium flex items-center gap-1">
                                        {isCloudReady ? '云端同步已开启' : '离线模式 (未配置 Firebase)'}
                                    </p>
                                </div>
                            </div>
                            <button 
                                onClick={() => setIsAdding(!isAdding)}
                                className={`transition-all duration-300 p-3 rounded-full shadow-lg ${isAdding ? 'bg-slate-900 text-white rotate-45' : 'bg-white text-slate-900 border border-slate-100'}`}
                            >
                                <IconPlus />
                            </button>
                        </header>

                        {isAdding && (
                            <div className="bg-white rounded-3xl border border-slate-100 p-6 mb-10 shadow-xl shadow-slate-200/50 scale-in">
                                <form onSubmit={addTask}>
                                    <input 
                                        type="text" 
                                        placeholder="键入新任务名称..."
                                        className="w-full text-xl font-light border-none focus:ring-0 p-0 mb-6 bg-transparent placeholder:text-slate-200"
                                        value={newTaskTitle}
                                        onChange={(e) => setNewTaskTitle(e.target.value)}
                                        autoFocus
                                    />
                                    <div className="space-y-6">
                                        <div className="flex flex-wrap gap-2">
                                            {Object.entries(CATEGORIES).map(([key, val]) => (
                                                <button key={key} type="button" onClick={() => setSelectedCategory(key)}
                                                    className={`px-4 py-1.5 rounded-full text-xs transition-all border ${selectedCategory === key ? 'bg-slate-900 text-white border-slate-900' : 'bg-white text-slate-500 border-slate-100'}`}>
                                                    <span className={`inline-block w-1.5 h-1.5 rounded-full mr-2 ${val.dot}`}></span>
                                                    {val.label}
                                                </button>
                                            ))}
                                        </div>
                                        <div className="grid grid-cols-2 gap-2">
                                            {Object.entries(QUADRANTS).map(([key, val]) => (
                                                <button key={key} type="button" onClick={() => setSelectedQuadrant(key)}
                                                    className={`text-left px-4 py-3 rounded-2xl text-xs transition-all border ${selectedQuadrant === key ? 'bg-indigo-50 border-indigo-200 text-indigo-700' : 'bg-white border-slate-100 text-slate-400'}`}>
                                                    {val.label}
                                                </button>
                                            ))}
                                        </div>
                                    </div>
                                    <button className="w-full mt-8 bg-slate-900 text-white py-4 rounded-2xl text-sm font-medium tracking-wide">
                                        确定
                                    </button>
                                </form>
                            </div>
                        )}

                        <div className="space-y-12">
                            {Object.entries(QUADRANTS).map(([quadId, quadInfo]) => {
                                const quadTasks = tasks.filter(t => t.quadrant === quadId);
                                if (quadTasks.length === 0 && quadId === 'completed') return null;
                                return (
                                    <section key={quadId}>
                                        <div className="flex items-center gap-4 mb-6 px-1">
                                            <h2 className="text-[12px] font-semibold text-slate-500 uppercase tracking-[0.25em] whitespace-nowrap">{quadInfo.label}</h2>
                                            <div className="h-[1px] w-full bg-slate-200/50"></div>
                                            <span className="text-[11px] font-mono text-slate-300 font-bold">{quadTasks.length}</span>
                                        </div>
                                        <div className="space-y-4">
                                            {quadTasks.map(task => (
                                                <TaskItem 
                                                    key={task.id} 
                                                    task={task} 
                                                    onDelete={() => deleteTask(task.id)}
                                                    onUpdateQuadrant={(q) => updateTask(task.id, { quadrant: q })}
                                                    onUpdateTask={(updates) => updateTask(task.id, updates)}
                                                />
                                            ))}
                                        </div>
                                    </section>
                                );
                            })}
                        </div>
                    </div>
                </div>
            );
        }

        function TaskItem({ task, onDelete, onUpdateQuadrant, onUpdateTask }) {
            const [isExpanded, setIsExpanded] = useState(false);
            const [showInput, setShowInput] = useState(false);
            const [noteText, setNoteText] = useState('');
            const [hourInput, setHourInput] = useState(0);

            const categoryInfo = CATEGORIES[task.category] || CATEGORIES.work;
            const quadrantInfo = QUADRANTS[task.quadrant];

            const handleSaveNote = () => {
                if (!noteText.trim() && hourInput === 0) return;
                const newNote = { text: noteText, hours: parseFloat(hourInput), timestamp: new Date().toLocaleString() };
                onUpdateTask({
                    notes: [newNote, ...(task.notes || [])],
                    totalHours: (task.totalHours || 0) + parseFloat(hourInput)
                });
                setNoteText('');
                setHourInput(0);
                setShowInput(false);
            };

            return (
                <div className={`group bg-white rounded-3xl transition-all border ${quadrantInfo.accent} ${isExpanded ? 'shadow-lg ring-1 ring-slate-100' : 'hover:border-slate-200 shadow-sm'}`}>
                    <div className="p-5 flex items-center justify-between">
                        <div className="flex items-center gap-4 flex-1 cursor-pointer overflow-hidden" onClick={() => setIsExpanded(!isExpanded)}>
                            <div className={`w-2 h-2 rounded-full flex-shrink-0 ${categoryInfo.dot}`}></div>
                            <h3 className={`text-[15px] font-light text-slate-800 truncate ${task.quadrant === 'completed' ? 'text-slate-300 line-through' : ''}`}>{task.title}</h3>
                        </div>
                        <div className="flex items-center gap-3">
                            <span className="text-[11px] font-mono font-medium text-slate-400 bg-slate-50 px-2 py-0.5 rounded-full">{(task.totalHours || 0).toFixed(2)}h</span>
                            <div className="flex items-center gap-1 border-l border-slate-100 pl-3">
                                <button onClick={() => onDelete()} className="p-2 text-slate-200 hover:text-red-400 transition-colors"><IconTrash /></button>
                                <button onClick={() => onUpdateQuadrant(task.quadrant === 'completed' ? 'important_urgent' : 'completed')} className={`p-2 ${task.quadrant === 'completed' ? 'text-indigo-500' : 'text-slate-200 hover:text-indigo-400'}`}><IconCheck /></button>
                            </div>
                        </div>
                    </div>
                    
                    {isExpanded && (
                        <div className="px-6 pb-6 scale-in border-t border-slate-50 pt-4">
                            {task.notes && task.notes.length > 0 && (
                                <div className="mb-4 space-y-3 max-h-48 overflow-y-auto pr-2 custom-scrollbar">
                                    <div className="flex items-center gap-2 mb-3">
                                        <span className="text-[10px] uppercase tracking-widest text-slate-300 font-bold">归档记录</span>
                                    </div>
                                    {task.notes.map((note, idx) => (
                                        <div key={idx} className="bg-slate-50/50 p-3 rounded-2xl border border-white">
                                            <div className="flex justify-between mb-1">
                                                <span className="text-[9px] text-slate-300 font-mono">{note.timestamp}</span>
                                                <span className="text-[9px] text-indigo-500 font-bold">+{note.hours}h</span>
                                            </div>
                                            <p className="text-xs font-light text-slate-600 leading-relaxed">{note.text || '专注投入'}</p>
                                        </div>
                                    ))}
                                </div>
                            )}

                            {!showInput ? (
                                <button 
                                    onClick={() => setShowInput(true)}
                                    className="w-full py-3 border border-dashed border-slate-200 rounded-2xl text-[11px] text-slate-400 hover:text-slate-600 hover:border-slate-300 transition-all flex items-center justify-center gap-2 bg-slate-50/30"
                                >
                                    <IconNote /> 记录新的心得或工时...
                                </button>
                            ) : (
                                <div className="bg-[#FBFBFC] rounded-2xl border border-slate-100 p-4 shadow-inner scale-in">
                                    <textarea 
                                        placeholder="记录心得..." 
                                        className="w-full text-sm font-light border-none focus:ring-0 p-0 mb-4 bg-transparent min-h-[50px] resize-none placeholder:text-slate-300"
                                        value={noteText}
                                        onChange={(e) => setNoteText(e.target.value)}
                                        autoFocus
                                    />
                                    <div className="flex items-center justify-between pt-3 border-t border-slate-100">
                                        <div className="flex items-center bg-white rounded-xl p-1 border border-slate-100">
                                            <button onClick={() => setHourInput(Math.max(0, hourInput - 0.25))} className="w-8 h-8 flex items-center justify-center text-slate-400 hover:text-slate-900">-</button>
                                            <span className="px-3 text-[11px] font-mono font-bold text-slate-600">{hourInput.toFixed(2)}h</span>
                                            <button onClick={() => setHourInput(hourInput + 0.25)} className="w-8 h-8 flex items-center justify-center text-slate-400 hover:text-slate-900">+</button>
                                        </div>
                                        <div className="flex gap-2">
                                            <button onClick={() => setShowInput(false)} className="px-3 py-2 text-[11px] text-slate-400">取消</button>
                                            <button 
                                                onClick={handleSaveNote}
                                                className="bg-slate-900 text-white px-5 py-2 rounded-xl text-[11px] font-medium active:scale-95 transition-all shadow-md">保存同步</button>
                                        </div>
                                    </div>
                                </div>
                            )}
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
